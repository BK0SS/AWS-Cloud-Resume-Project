AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Cloud Resume Challenge — full stack.
  Provisions a versioned S3 bucket for the static site, a CloudFront
  distribution (HTTPS + OAC), a DynamoDB visitor-counter table, a Python
  Lambda function, and a public HTTP API.

Parameters:
  ProjectName:
    Type: String
    Default: cloud-resume
    Description: Prefix used for resource names.
  AllowedOrigin:
    Type: String
    Default: "*"
    Description: CORS allowed origin for the visitor counter API. Set to your
      site URL once the CloudFront distribution is live (e.g. https://dxxxx.cloudfront.net).

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128
    Tracing: Active

Resources:

  # ----------------- DynamoDB -----------------
  VisitorCounterTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-visitors"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ----------------- Lambda + HTTP API -----------------
  VisitorCounterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-visitor-counter"
      CodeUri: ../backend/src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref VisitorCounterTable
          COUNTER_ID: site
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitorCounterTable
      Events:
        VisitorsPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref VisitorApi
            Path: /visitors
            Method: post
        VisitorsOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref VisitorApi
            Path: /visitors
            Method: options

  VisitorApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "${ProjectName}-api"
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
        MaxAge: 300

  # ----------------- S3 (static site) -----------------
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-site-${AWS::AccountId}"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ----------------- CloudFront -----------------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${ProjectName} static site"
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: s3-site-origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: s3-site-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # AWS-managed CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 10
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  SiteBucketName:
    Description: S3 bucket holding the static site assets.
    Value: !Ref SiteBucket
    Export:
      Name: !Sub "${ProjectName}-site-bucket"

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (use for cache invalidation in CI).
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "${ProjectName}-cf-id"

  CloudFrontDomainName:
    Description: Public site URL (HTTPS).
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  VisitorCounterApiUrl:
    Description: HTTP API endpoint for the visitor counter — paste into frontend/js/main.js.
    Value: !Sub "https://${VisitorApi}.execute-api.${AWS::Region}.amazonaws.com/visitors"
